name: Publish vcs-graph to crates.io

on:
  push:
    tags:
      - "vcs-graph-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/vcs-graph-v')
        run: |
          tag="${GITHUB_REF#refs/tags/vcs-graph-v}"
          manifest=$(cargo metadata --no-deps --format-version=1 \
            | python -c 'import json,sys; m=json.load(sys.stdin); print(next(p["version"] for p in m["packages"] if p["name"]=="vcs-graph"))')
          if [ "$tag" != "$manifest" ]; then
            echo "tag $tag does not match Cargo.toml version $manifest" >&2
            exit 1
          fi
      - name: cargo publish
        run: cargo publish -p vcs-graph --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
